  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1200px; height:630px; background:#000; overflow:hidden; }

  .card{
    position:relative; width:1200px; height:630px; background:#000;
    color:#f4f4f6; overflow:hidden;
    font-family:'Space Grotesk',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* the ONE magic accent — a soft spectral glow, kept off the text column */
  .glow{
    position:absolute; width:820px; height:820px; border-radius:50%;
    right:-230px; top:-260px; pointer-events:none;
    background:
      radial-gradient(closed-side, rgba(204,68,221,0.00), rgba(0,0,0,0)),
      radial-gradient(circle at 50% 50%,
        rgba(255,68,102,0.55) 0%,
        rgba(204,68,221,0.42) 34%,
        rgba(120,68,255,0.16) 55%,
        rgba(0,0,0,0) 72%);
    filter:blur(6px);
  }
  .glow2{
    position:absolute; width:540px; height:540px; border-radius:50%;
    left:-220px; bottom:-260px; pointer-events:none; opacity:.6;
    background:radial-gradient(circle at 50% 50%,
        rgba(51,153,255,0.30) 0%, rgba(119,68,255,0.20) 40%, rgba(0,0,0,0) 70%);
    filter:blur(4px);
  }

  /* faint engineering grid texture, very low contrast */
  .grid{
    position:absolute; inset:0; pointer-events:none; opacity:.55;
    background-image:
      linear-gradient(rgba(255,255,255,0.020) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.020) 1px, transparent 1px);
    background-size:56px 56px;
    -webkit-mask-image:radial-gradient(circle at 62% 30%, #000 0%, rgba(0,0,0,0.35) 60%, transparent 85%);
            mask-image:radial-gradient(circle at 62% 30%, #000 0%, rgba(0,0,0,0.35) 60%, transparent 85%);
  }

  /* spectral hairline along the very top */
  .topline{
    position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,#ff4466,#ff8833,#ffcc22,#33dd77,#3399ff,#7744ff,#cc44dd);
    opacity:.9;
  }

  .inner{
    position:absolute; inset:0; padding:76px 84px;
    display:flex; flex-direction:column; justify-content:space-between;
  }

  /* ── header ── */
  .head{ display:flex; align-items:center; justify-content:space-between; }
  .brand{ display:flex; align-items:center; gap:20px; }
  .brand svg{ height:56px; width:auto; display:block; }
  .wordmark{
    font-family:'Syne',sans-serif; font-weight:800; font-size:34px;
    letter-spacing:.01em; color:#fff;
  }
  .tag{
    font-family:'JetBrains Mono',monospace; font-weight:500; font-size:15px;
    letter-spacing:.16em; text-transform:uppercase; color:#8d8d99;
  }
  .tag b{ color:#cfcfd6; font-weight:500; }

  /* ── main ── */
  .main{ max-width:940px; }
  .eyebrow{
    font-family:'JetBrains Mono',monospace; font-weight:500; font-size:16px;
    letter-spacing:.2em; text-transform:uppercase; color:#7b7b86;
    margin-bottom:26px;
  }
  .headline{
    font-family:'Syne',sans-serif; font-weight:800; font-size:82px;
    line-height:1.02; letter-spacing:-0.02em; color:#fff;
  }
  .headline .spec{
    background:linear-gradient(96deg,#ff4466 0%,#ff5a7a 30%,#cc44dd 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .spell{
    margin-top:30px; font-family:'JetBrains Mono',monospace; font-weight:500;
    font-size:23px; letter-spacing:.005em; color:#b4b4be;
  }
  .spell .g{
    background:linear-gradient(90deg,#ff4466,#cc44dd);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    font-weight:500;
  }

  /* ── footer ── */
  .foot{ display:flex; align-items:flex-end; justify-content:space-between; }
  .foot .desc{
    font-family:'Space Grotesk',sans-serif; font-weight:500; font-size:21px;
    color:#a9a9b4; letter-spacing:.005em;
  }
  .foot .url{
    font-family:'JetBrains Mono',monospace; font-weight:500; font-size:24px;
    color:#fff; letter-spacing:.01em; white-space:nowrap;
    display:flex; align-items:center; gap:12px;
  }
  .foot .url .dot{
    width:9px; height:9px; border-radius:50%;
    background:linear-gradient(135deg,#ff4466,#cc44dd);
    box-shadow:0 0 14px 2px rgba(255,68,102,.55);
    display:inline-block;
  }
</style>

  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="grid"></div>
